name: Bug report
description: Report reproducible incorrect behavior
title: "[Bug]: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: >-
        Remove secrets, private source code, terminal output, tokens, and personal
        information before submitting. Report security issues privately instead.
  - type: input
    id: version
    attributes:
      label: Version or commit
      placeholder: v0.1.0 or commit SHA
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      description: OS, Node.js version, browser, and tmux version when relevant
      placeholder: Ubuntu 24.04, Node 22.18, Chrome 138, tmux 3.4
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the observed and expected behavior.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction steps
      placeholder: |
        1. Start the server with ...
        2. Open ...
        3. Observe ...
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Sanitized logs or screenshots
      description: Optional. Redact credentials, paths, source code, and terminal history.
      render: shell
  - type: checkboxes
    id: checks
    attributes:
      label: Submission checks
      options:
        - label: I searched existing issues for duplicates.
          required: true
        - label: This report does not contain sensitive data or describe a vulnerability.
          required: true
